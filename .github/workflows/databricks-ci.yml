name: Databricks Asset Bundles CI

on:
  pull_request:
    branches:
      - main
      - feature/dabsdeploy
  push:
    branches:
      - main
      - feature/dabsdeploy

jobs:
  validate-and-deploy:
    runs-on: html_publisher

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main
        env:
          DATABRICKS_HOST: 'https://e2-demo-field-eng.cloud.databricks.com'
          DATABRICKS_TOKEN: ${{ secrets.DEPLOY_NOTEBOOK_TOKEN }}

      - name: Configure Databricks CLI authentication
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = https://e2-demo-field-eng.cloud.databricks.com" >> ~/.databrickscfg
          echo "token = ${{ secrets.DEPLOY_NOTEBOOK_TOKEN }}" >> ~/.databrickscfg

      - name: Validate bundle
        env:
          SERVING_ENDPOINT_NAME: ${{ vars.SERVING_ENDPOINT_NAME }}
        run: |
          if [ -f customer-billing-accelerator/databricks.yml ]; then
            cd customer-billing-accelerator
          fi
          EP="${SERVING_ENDPOINT_NAME:-ai_customer_billing_agent}"
          databricks bundle validate \
            --var "environment=dev" \
            --var "serving_endpoint_name=$EP"

      - name: Deploy bundle (push only)
        if: github.event_name == 'push'
        env:
          SERVING_ENDPOINT_NAME: ${{ vars.SERVING_ENDPOINT_NAME }}
        run: |
          if [ -f customer-billing-accelerator/databricks.yml ]; then
            cd customer-billing-accelerator
          fi
          EP="${SERVING_ENDPOINT_NAME:-ai_customer_billing_agent}"
          databricks bundle deploy \
            --var "environment=dev" \
            --var "serving_endpoint_name=$EP"

      - name: Start app compute (push only)
        if: github.event_name == 'push'
        env:
          SERVING_ENDPOINT_NAME: ${{ vars.SERVING_ENDPOINT_NAME }}
        run: |
          if [ -f customer-billing-accelerator/databricks.yml ]; then
            cd customer-billing-accelerator
          fi
          EP="${SERVING_ENDPOINT_NAME:-ai_customer_billing_agent}"
          databricks bundle run billing_chatbot_app \
            --var "environment=dev" \
            --var "serving_endpoint_name=$EP" || true
